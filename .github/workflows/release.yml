name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Package for macOS
        if: matrix.os == 'macos-latest'
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package for Windows
        if: matrix.os == 'windows-latest'
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package for Linux
        if: matrix.os == 'ubuntu-latest'
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases-${{ matrix.os }}
          path: release/*

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: releases

      - name: Calculate macOS DMG SHA256
        id: calc_sha
        run: |
          cd releases/releases-macos-latest
          DMG_FILE=$(ls *.dmg | head -n 1)
          SHA256=$(shasum -a 256 "$DMG_FILE" | cut -d " " -f 1)
          echo "dmg_file=$DMG_FILE" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "Calculated SHA256 for $DMG_FILE: $SHA256"

      - name: Update Casks/diffsurfer.rb with new SHA256
        run: |
          # Extract version from tag (removing 'v' prefix)
          VERSION=${GITHUB_REF_NAME#v}
          echo "Updating Casks/diffsurfer.rb for version $VERSION"

          # Update version and SHA256 in the cask file
          sed -i "s/version \".*\"/version \"$VERSION\"/" Casks/diffsurfer.rb
          sed -i "s/sha256 \".*\"/sha256 \"${{ steps.calc_sha.outputs.sha256 }}\"/" Casks/diffsurfer.rb

          # Display the changes
          echo "Updated Casks/diffsurfer.rb:"
          cat Casks/diffsurfer.rb

      - name: Commit updated Casks file
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Casks/diffsurfer.rb
          git commit -m "chore: update cask for version ${GITHUB_REF_NAME#v}"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            releases/releases-macos-latest/*.dmg
            releases/releases-macos-latest/*.zip
            releases/releases-windows-latest/*.exe
            releases/releases-windows-latest/*.zip
            releases/releases-ubuntu-latest/*.AppImage
            releases/releases-ubuntu-latest/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
